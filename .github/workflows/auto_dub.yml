name: Auto Dub from Drive

# SOURCES (all automatic):
#   1. Video files dropped in Drive "DubInbox".
#   2. YouTube links: drop a .txt file in DubInbox with one URL per line.
#      The links file is archived immediately; each URL gets its own runner
#      which downloads via yt-dlp (cookies supported) and dubs it.
#   3. Manual run with the "url" input for a one-off link.
#
# Cron every 5 min; empty inbox = one tiny scan job. Up to 4 videos dub in
# parallel; chunks within a video dub in parallel too (workers, default 8).
# Normal mode only - no turbo (long videos).
#
# Secrets: RCLONE_CONF (required), YT_COOKIES_B64 (recommended for YouTube),
#          DUB_BASE_URL (optional).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube/video URL to dub (optional one-off)"
        default: ""
        required: false
      src:
        description: "Source language"
        default: "Hindi"
        required: false
      target:
        description: "Target language"
        default: "English"
        required: false
      genre:
        description: "Genre (monologue, podcast, ott_movie_sequence, advertisement, edtech, academic_lecture_formal)"
        default: "monologue"
        required: false
      speakers:
        description: "Number of speakers"
        default: "1"
        required: false
      chunk:
        description: "Seconds per chunk (60 = clean + fast)"
        default: "60"
        required: false
      workers:
        description: "Max chunks dubbing at once per video"
        default: "8"
        required: false
      tries:
        description: "Retries per chunk"
        default: "5"
        required: false
      inbox:
        description: "Drive inbox folder"
        default: "DubInbox2"
        required: false
      outbox:
        description: "Drive output folder"
        default: "DubDone"
        required: false

concurrency:
  group: dub-drive
  cancel-in-progress: false

env:
  URL: ${{ github.event.inputs.url || '' }}
  SRC: ${{ github.event.inputs.src || 'Hindi' }}
  TGT: ${{ github.event.inputs.target || 'English' }}
  GENRE: ${{ github.event.inputs.genre || 'monologue' }}
  SPEAKERS: ${{ github.event.inputs.speakers || '1' }}
  CHUNK: ${{ github.event.inputs.chunk || '60' }}
  WORKERS: ${{ github.event.inputs.workers || '8' }}
  TRIES: ${{ github.event.inputs.tries || '5' }}
  INBOX: ${{ github.event.inputs.inbox || 'DubInbox2' }}
  OUTBOX: ${{ github.event.inputs.outbox || 'DubDone' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      count: ${{ steps.scan.outputs.count }}
      queue: ${{ steps.scan.outputs.queue }}
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Connect Google Drive (rclone)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          if [ -z "$RCLONE_CONF" ]; then
            echo "::error::RCLONE_CONF secret is not set."
            exit 1
          fi
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null 2>&1
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Scan inbox (videos + link files)
        id: scan
        run: |
          # 1) Video files waiting in the inbox.
          rclone lsjson "gdrive:${INBOX}" --files-only 2>/dev/null | python3 list_videos.py > queue.txt || true

          # 2) Link files (*.txt): read their URLs, then archive them right away
          #    so the next cron tick never re-queues the same links.
          touch links_raw.txt
          rclone lsf "gdrive:${INBOX}" --files-only --include "*.txt" 2>/dev/null | while IFS= read -r T; do
            [ -z "$T" ] && continue
            TRYN=0
            case "$T" in
              retry_*) TRYN=$(echo "$T" | sed -n "s/^retry_\([0-9]*\)_.*/\1/p"); [ -z "$TRYN" ] && TRYN=0 ;;
            esac
            echo "Reading links file: $T (attempt $TRYN)"
            rclone cat "gdrive:${INBOX}/${T}" | sed "s/^/${TRYN} /" >> links_raw.txt || true
            echo "" >> links_raw.txt
            rclone moveto "gdrive:${INBOX}/${T}" "gdrive:${INBOX}/archive/${T}" || true
          done

          # 3) Manual one-off URL from the Run-workflow form.
          if [ -n "$URL" ]; then
            echo "0 $URL" >> links_raw.txt
          fi

          QUEUE=$(python3 build_queue.py)
          COUNT=$(python3 -c "import json,sys; print(len(json.loads(sys.argv[1])))" "$QUEUE")
          echo "Queue ($COUNT item(s)): $QUEUE"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "queue=$QUEUE" >> "$GITHUB_OUTPUT"

  dub:
    needs: scan
    if: needs.scan.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 4          # 4 videos dub simultaneously
      matrix:
        item: ${{ fromJSON(needs.scan.outputs.queue) }}
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Connect Google Drive (rclone)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null 2>&1
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Install ffmpeg + python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python3 -m pip install -q --upgrade pip requests "yt-dlp[default]" yt-dlp-ejs bgutil-ytdlp-pot-provider

      - name: Get the video (Drive file or yt-dlp)
        id: get
        env:
          KIND: ${{ matrix.item.kind }}
          REF: ${{ matrix.item.ref }}
          TRYN: ${{ matrix.item.try }}
          YT_COOKIES_B64: ${{ secrets.YT_COOKIES_B64 }}
          YT_PROXY: ${{ secrets.YT_PROXY }}
        run: |
          mkdir -p input output
          if [ "$KIND" = "file" ]; then
            # Skip if another run already archived it.
            if ! rclone lsf "gdrive:${INBOX}/${REF}" >/dev/null 2>&1; then
              echo "::notice::${REF} no longer in ${INBOX} - already handled."
              echo "have=no" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            rclone copy "gdrive:${INBOX}/${REF}" input/ --drive-chunk-size 64M -v
          else
            # PO-token provider: defeats YouTube's datacenter-IP bot check.
            docker run -d --name bgutil -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider || true
            # Deno: JS runtime for yt-dlp's n-challenge solver.
            curl -fsSL https://deno.land/install.sh | sh -s -- -y >/dev/null 2>&1
            export PATH="$HOME/.deno/bin:$PATH"
            deno --version | head -n1
            sleep 6
            CK=""
            if [ -n "$YT_COOKIES_B64" ]; then
              printf '%s' "$YT_COOKIES_B64" | base64 -d > cookies.txt && CK="--cookies cookies.txt"
              echo "Using YouTube cookies."
            fi
            PX=""
            if [ -n "$YT_PROXY" ]; then
              PX="--proxy $YT_PROXY"
              echo "Using proxy."
            fi
            yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 --concurrent-fragments 18 --no-mtime \
              --no-playlist --no-overwrites --retries 3 --sleep-requests 1 \
              $CK $PX -o "input/%(title).100s.%(ext)s" "$REF" || true
          fi
          IN=$(ls input/ 2>/dev/null | head -n1)
          if [ -z "$IN" ] && [ "$KIND" = "url" ]; then
            MAXTRY=3
            NEXT=$(( ${TRYN:-0} + 1 ))
            if [ "$NEXT" -le "$MAXTRY" ]; then
              RT="retry_${NEXT}_$(date +%s)$RANDOM.txt"
              echo "$REF" > "$RT"
              rclone copy "$RT" "gdrive:${INBOX}" -v || true
              echo "::warning::Download failed - re-queued as $RT (attempt $NEXT/$MAXTRY): $REF"
            else
              echo "FAILED TO FETCH after $MAXTRY retries: $REF" > output/FAILED_LINK.txt
              rclone copy output/ "gdrive:${OUTBOX}" -v || true
              echo "::error::Giving up on $REF after $MAXTRY retries."
            fi
            echo "have=no" >> "$GITHUB_OUTPUT"
            exit 1
          elif [ -z "$IN" ]; then
            echo "::error::Could not get video for: $REF"
            echo "have=no" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "have=yes" >> "$GITHUB_OUTPUT"
          echo "Got: $IN"

      - name: Dub this video
        if: steps.get.outputs.have == 'yes'
        env:
          DUB_BASE_URL: ${{ secrets.DUB_BASE_URL }}
          KIND: ${{ matrix.item.kind }}
          REF: ${{ matrix.item.ref }}
        run: |
          IN=$(ls input/ | head -n1)
          echo "==> Dubbing: $IN"
          COMMON="--src $SRC --target $TGT --genre $GENRE --speakers $SPEAKERS --dir $GITHUB_WORKSPACE/output --chunk $CHUNK --workers $WORKERS --tries $TRIES"

          python dub_video.py "$GITHUB_WORKSPACE/input/$IN" $COMMON || true

          WORKDIR=$(ls -d "$GITHUB_WORKSPACE"/work_* 2>/dev/null | head -n1)
          if [ -n "$WORKDIR" ] && [ -d "$WORKDIR/chunks" ]; then
            MAX_PASSES=5
            PASS=0
            while :; do
              TOTAL=$(ls "$WORKDIR/chunks"/part_*.mp4 2>/dev/null | wc -l)
              DONE=$(ls "$WORKDIR/chunks"/dub_*.mp4 2>/dev/null | wc -l)
              MISSING=$(( TOTAL - DONE ))
              echo "::notice::$IN - $DONE/$TOTAL chunks done, $MISSING missing (pass $PASS)."
              if [ "$MISSING" -le 0 ]; then echo "All chunks complete."; break; fi
              PASS=$(( PASS + 1 ))
              if [ "$PASS" -gt "$MAX_PASSES" ]; then
                echo "::warning::$IN - $MISSING chunk(s) still missing after $MAX_PASSES passes."
                break
              fi
              PREV=$DONE
              python dub_video.py "$WORKDIR/chunks" $COMMON || true
              NOWDONE=$(ls "$WORKDIR/chunks"/dub_*.mp4 2>/dev/null | wc -l)
              if [ "$NOWDONE" -le "$PREV" ]; then
                echo "No new chunks this pass; cooling down 30s..."
                sleep 30
              fi
            done

            STEM="${IN%.*}"
            FAILDIR="$GITHUB_WORKSPACE/output/${STEM}_FAILED_CHUNKS"
            FAILED_LIST=""
            for p in "$WORKDIR/chunks"/part_*.mp4; do
              [ -e "$p" ] || continue
              base=$(basename "$p")
              num="${base#part_}"; num="${num%.mp4}"
              if [ ! -e "$WORKDIR/chunks/dub_${num}.mp4" ]; then
                mkdir -p "$FAILDIR"
                cp "$p" "$FAILDIR/$base"
                FAILED_LIST="$FAILED_LIST $num"
              fi
            done
            if [ -n "$FAILED_LIST" ]; then
              {
                echo "These chunks failed after $TRIES tries and are SILENT in the video."
                echo "Failed chunk numbers:$FAILED_LIST"
              } > "$FAILDIR/README_FAILED.txt"
              echo "::warning::$IN - failed chunks saved:$FAILED_LIST"
            fi
          fi

          if [ -n "$(ls -A output/ 2>/dev/null)" ]; then
            rclone copy output/ "gdrive:${OUTBOX}" --transfers 2 --drive-chunk-size 64M -v
            if [ "$KIND" = "file" ]; then
              rclone moveto "gdrive:${INBOX}/${REF}" "gdrive:${INBOX}/archive/${REF}" -v || \
                echo "::warning::Could not archive ${REF}."
            fi
            echo "==> $IN done -> ${OUTBOX}."
          else
            echo "::error::$IN produced no output."
            exit 1
          fi

      - name: Backup copy in Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dubbed-${{ strategy.job-index }}
          path: output/**
          retention-days: 30
          if-no-files-found: ignore
